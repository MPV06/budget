# Global Streamlit theme — dark mode by default.
# Reference aesthetic: pulsechainstats.com (deep navy + glass-morphism cards)
# Synthesized with web-design-guidelines + scientific-visualization standards.

[theme]
base = "dark"
primaryColor = "#34d399"                    # emerald-400 — anchor accent
backgroundColor = "#0a0e27"                 # deep navy (page bg)
secondaryBackgroundColor = "#141936"        # card / panel bg
textColor = "#e2e8f0"                       # slate-200 — primary text
font = "sans serif"

[browser]
gatherUsageStats = false

[server]
# Default to localhost-only for privacy per privacy-data-security standards.
address = "127.0.0.1"
headless = true
